<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - CodeLearn</title>
    <link rel="stylesheet" href="stylepr33.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">CodeLearn</div>
                <nav class="nav">
                    <a href="indexpr33.html">Главная</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <h2>Вход в CodeLearn</h2>
                <form class="auth-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="your@email.com" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" placeholder="••••••••" class="form-input">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Войти</button>
                </form>
                <div class="auth-footer">
                    <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>© 2026 CodeLearn. Практическая 2 Панов А.С.</p>
        </div>
    </footer>
</body>
</html>
